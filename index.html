<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thirst URL Shortener</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.yellow.min.css"
    />
    <style>
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: 100%;
        max-width: 350px;
        text-align: center;
      }

      #customUrlGroup {
        display: none;
        margin-top: 1rem;
      }

      #result {
        margin-top: 1.5rem;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main>
      <h2>🔗 Url Shortener</h2>
      <p>Build by <a href="https://github.com/thirst154">thirst154</a></p>

      <form id="shortenForm">
        <input
          type="url"
          id="urlInput"
          placeholder="https://example.com/very/long/url"
          required
        />

        <label>
          <input type="checkbox" id="customToggle" role="switch" />
          Use custom short URL
        </label>

        <div id="customUrlGroup">
          <input
            type="text"
            id="customInput"
            placeholder="mycustomlink"
            pattern="[a-zA-Z0-9]+"
            maxlength="16"
          />
          <small>Letters and numbers only.</small>
        </div>

        <button type="submit" id="submitBtn">Shorten</button>
      </form>

      <div id="result"></div>
    </main>

    <script>
      const form        = document.getElementById('shortenForm');
      const urlInput    = document.getElementById('urlInput');
      const toggle      = document.getElementById('customToggle');
      const customGroup = document.getElementById('customUrlGroup');
      const customInput = document.getElementById('customInput');
      const submitBtn   = document.getElementById('submitBtn');
      const result      = document.getElementById('result');

      toggle.addEventListener('change', () => {
        customGroup.style.display = toggle.checked ? 'block' : 'none';
        customInput.required = toggle.checked;
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const url  = urlInput.value;
        const body = { original_url: url };
        if (toggle.checked && customInput.value) {
          body.code = customInput.value;
        }

        submitBtn.setAttribute('aria-busy', 'true');
        submitBtn.disabled = true;
        result.innerHTML   = '';

        try {
          const res  = await fetch('/shorten', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(body),
          });
          const data = await res.json();

          if (!res.ok) {
            const p = document.createElement('p');
            p.style.color = 'red';
            p.textContent = data.error;
            result.appendChild(p);
          } else {
            const shortURL = `${location.origin}/${data.code}`;

            const a = document.createElement('a');
            a.href        = shortURL;
            a.textContent = shortURL;

            const copyBtn = document.createElement('button');
            copyBtn.textContent      = 'Copy';
            copyBtn.style.marginTop  = '0.75rem';
            copyBtn.addEventListener('click', () => {
              navigator.clipboard.writeText(shortURL).then(() => {
                copyBtn.textContent = 'Copied!';
                setTimeout(() => { copyBtn.textContent = 'Copy'; }, 2000);
              });
            });

            result.appendChild(a);
            result.appendChild(copyBtn);
          }
        } catch {
          const p = document.createElement('p');
          p.style.color = 'red';
          p.textContent = 'Network error. Please try again.';
          result.appendChild(p);
        } finally {
          submitBtn.removeAttribute('aria-busy');
          submitBtn.disabled = false;
          urlInput.value     = '';
          customInput.value  = '';
        }
      });
    </script>
  </body>
</html>
